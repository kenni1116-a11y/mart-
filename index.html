<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#11161d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Einkaufszettel">
    <meta name="description" content="Eine schlichte Einkaufszettel-App mit Marktsimulation und Favoriten.">
    <title>Zettel</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon.svg">
    <link rel="stylesheet" href="./styles.css?v=71">
  </head>
  <body>
    <section class="auth-gate" id="authGate" aria-labelledby="authTitle">
      <div class="auth-sheet">
        <div class="auth-brand" aria-hidden="true">Zettel</div>
        <div class="auth-copy">
          <p class="auth-title" id="authTitle">Wird vorbereitet</p>
          <p>Dein Geräte-Account wird sicher verbunden.</p>
        </div>

        <div class="auth-form auth-device-panel">
          <div class="auth-device-loader" aria-hidden="true"></div>
          <button class="auth-secondary is-hidden" id="authRetryButton" type="button">Erneut verbinden</button>
        </div>

        <p class="auth-status" id="authStatus" role="status" aria-live="polite"></p>
      </div>
    </section>

    <div class="app-shell is-hidden" id="appShell">
      <header class="topbar">
        <button class="topbar-icon" id="topMenuButton" type="button" aria-label="Optionen öffnen" aria-expanded="false" aria-controls="topOptions">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14M5 12h14M5 17h14"/></svg>
        </button>
        <div class="brand-zone"><h1>zettel</h1></div>
        <button class="topbar-icon" id="accountButton" type="button" aria-label="Profil öffnen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20c.8-4 3-6 6.5-6s5.7 2 6.5 6"/></svg>
        </button>
      </header>
      <button class="top-options-scrim" id="topOptionsScrim" type="button" aria-label="Optionen schließen" tabindex="-1" aria-hidden="true"></button>
      <nav class="top-options" id="topOptions" aria-label="Optionen" aria-hidden="true">
        <button class="top-options-close" id="topOptionsCloseButton" type="button" aria-label="Optionen schließen">&times;</button>
        <h2>Optionen</h2>
        <div class="top-options-list">
          <button id="openBackgroundButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 0 18h1.5a2 2 0 0 0 0-4H12a2 2 0 0 1 0-4h3a6 6 0 0 0 0-12h-3Z"/><path d="M7.5 10h.01M9 6.5h.01M14 6h.01"/></svg>
            <span>Hintergrund anpassen</span>
          </button>
          <button id="openDataToolsButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14"/></svg>
            <span>Daten hinzufügen</span>
          </button>
          <button id="imprintButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 11v6m0-10h.01"/></svg>
            <span>Impressum</span>
          </button>
          <button id="bugreportButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h8v10H8V8Zm2-4h4l1 4H9l1-4ZM4 11h4m8 0h4M5 17l3-2m11 2-3-2"/></svg>
            <span>Bugreport</span>
          </button>
        </div>
      </nav>
      <nav class="workspace-tabs" aria-label="Hauptbereich">
        <button class="workspace-tab is-active" type="button" data-workspace="pinnwand" aria-current="page">Pinnwand</button>
        <button class="workspace-tab" type="button" data-workspace="market">Markt</button>
      </nav>

      <main class="layout">
        <section class="market-panel" aria-label="Artikel auswählen">
          <nav class="tabs" aria-label="Auswahlmodus">
            <button class="tab is-active" type="button" data-view="market" aria-label="Artikelmarkt">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10h16l-1 10H5L4 10Zm2-4h12l2 4H4l2-4Zm4 8h4"/></svg>
              Markt
            </button>
            <button class="tab" type="button" data-view="favorites">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z"/></svg>
              Favoriten
            </button>
          </nav>

          <div class="search-row">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"/></svg>
            <input id="searchInput" type="search" placeholder="Artikel suchen">
          </div>

          <div id="marketView">
            <div class="section-head">
              <h2>Regale</h2>
              <div class="shelf-tools">
                <span id="shelfCount"></span>
                <button class="reorder-done-button is-hidden" id="reorderDoneButton" type="button">Fertig</button>
              </div>
            </div>
            <div class="shelf-grid" id="shelfGrid"></div>
          </div>

          <div id="productsView" class="is-hidden">
            <div class="section-head">
              <button class="back-button" id="backButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"/></svg>
                Regale
              </button>
              <h2 id="currentShelfTitle"></h2>
            </div>
            <div class="product-grid" id="productGrid"></div>
          </div>

          <div id="favoritesView" class="is-hidden">
            <div class="section-head">
              <h2>Favoriten</h2>
              <span id="favoriteCount"></span>
            </div>
            <div class="product-grid" id="favoriteGrid"></div>
          </div>
        </section>

        <aside class="notes-board" aria-label="Einkaufszettel">
          <div class="notes-board-actions">
            <div class="new-note-action">
              <span>Neuer Zettel</span>
              <button class="add-note-button" id="addListButton" type="button" aria-label="Neuer Zettel">+</button>
            </div>
          </div>
          <div class="notes-stack" id="notesStack"></div>
        </aside>
      </main>
    </div>

    <div class="modal-layer is-hidden" id="modalLayer" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalCloseButton" type="button" aria-label="Schließen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div id="modalContent"></div>
      </div>
    </div>

    <script src="./app-version.js?v=71"></script>
    <script src="./supabase-config.js?v=71"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="./account-logic.js?v=71"></script>
    <script src="./sync-logic.js?v=71"></script>
    <script src="./app-logic.js?v=71"></script>
    <script src="./product-icon-assets.js?v=71"></script>
    <script src="./app.js?v=71"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" })
            .then((registration) => registration.update())
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
